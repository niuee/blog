<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.0/styles/github.min.css" id="hljs-light-theme" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.0/styles/github-dark.min.css" id="hljs-dark-theme" disabled />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/katex.min.css" />
    <link rel="stylesheet" href="/dark-mode.css" />
    <link rel="stylesheet" href="/blog-styles.css" />
    <script>
      // Set font size attribute immediately before body renders to prevent animation
      (function() {
        const savedFontSize = localStorage.getItem('blog-font-size') || 'large';
        document.documentElement.setAttribute('data-font-size', savedFontSize);
      })();
      
      // Set language attribute
      (function() {
        const savedLang = localStorage.getItem('blog-language');
        document.documentElement.lang = savedLang || 'en';
      })();
    </script>
  </head>
  <body>
    <div class="font-size-controls">
      <button class="font-size-btn" id="font-size-small" aria-label="Small font size" title="Small">A</button>
      <button class="font-size-btn" id="font-size-medium" aria-label="Medium font size" title="Medium">A</button>
      <button class="font-size-btn" id="font-size-large" aria-label="Large font size" title="Large">A</button>
    </div>
    <input type="checkbox" id="dark-mode-toggle" class="dark-mode-toggle" />
    <script>
      // Set dark mode state immediately to prevent flash
      (function() {
        const savedDarkMode = localStorage.getItem('blog-dark-mode') === 'true';
        if (savedDarkMode) {
          const darkModeToggle = document.getElementById('dark-mode-toggle');
          if (darkModeToggle) {
            darkModeToggle.checked = true;
          }
          const hljsLightTheme = document.getElementById('hljs-light-theme');
          const hljsDarkTheme = document.getElementById('hljs-dark-theme');
          if (hljsLightTheme && hljsDarkTheme) {
            hljsLightTheme.disabled = true;
            hljsDarkTheme.disabled = false;
          }
        }
      })();
    </script>
    <label for="dark-mode-toggle" class="dark-mode-label" aria-label="Toggle dark mode">
      <span class="switch-plate">
        <span class="switch-toggle"></span>
      </span>
    </label>
    <div class="container">
      <header>
        <h1>404</h1>
        <div class="meta">Page Not Found</div>
      </header>
      <div id="blog-content">
        <article>
          <p>The page you're looking for doesn't exist or has been moved.</p>
          <p>
            <a href="/">Return to homepage</a> or 
            <a href="/articles">browse articles</a>.
          </p>
        </article>
      </div>
    </div>
    <script>
      // Reset scroll position on page load
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;

      // Dark mode toggle functionality
      const darkModeToggle = document.getElementById('dark-mode-toggle');
      const darkModeLabel = document.querySelector('.dark-mode-label');
      const hljsLightTheme = document.getElementById('hljs-light-theme');
      const hljsDarkTheme = document.getElementById('hljs-dark-theme');
      
      const savedDarkMode = localStorage.getItem('blog-dark-mode') === 'true';
      if (savedDarkMode && darkModeToggle) {
        darkModeToggle.checked = true;
        if (hljsLightTheme && hljsDarkTheme) {
          hljsLightTheme.disabled = true;
          hljsDarkTheme.disabled = false;
        }
      }

      if (darkModeToggle && darkModeLabel) {
        let scrollPosition = 0;
        
        darkModeLabel.addEventListener('mousedown', () => {
          scrollPosition = window.pageYOffset || document.documentElement.scrollTop;
        });
        
        darkModeLabel.addEventListener('click', (e) => {
          e.preventDefault();
          darkModeToggle.checked = !darkModeToggle.checked;
          localStorage.setItem('blog-dark-mode', darkModeToggle.checked ? 'true' : 'false');
          
          if (hljsLightTheme && hljsDarkTheme) {
            hljsLightTheme.disabled = darkModeToggle.checked;
            hljsDarkTheme.disabled = !darkModeToggle.checked;
          }
          
          setTimeout(() => {
            window.scrollTo(0, scrollPosition);
            if (document.documentElement.scrollTop !== scrollPosition) {
              document.documentElement.scrollTop = scrollPosition;
            }
            if (document.body.scrollTop !== scrollPosition) {
              document.body.scrollTop = scrollPosition;
            }
          }, 0);
        });
        
        darkModeToggle.addEventListener('focus', (e) => {
          e.preventDefault();
          darkModeToggle.blur();
        });
        
        darkModeToggle.addEventListener('change', function(e) {
          localStorage.setItem('blog-dark-mode', e.target.checked ? 'true' : 'false');
          if (hljsLightTheme && hljsDarkTheme) {
            hljsLightTheme.disabled = e.target.checked;
            hljsDarkTheme.disabled = !e.target.checked;
          }
        });
      }

      // Font size controls
      const fontSizeButtons = {
        small: document.getElementById('font-size-small'),
        medium: document.getElementById('font-size-medium'),
        large: document.getElementById('font-size-large')
      };

      const savedFontSize = localStorage.getItem('blog-font-size') || 'large';
      if (!document.documentElement.hasAttribute('data-font-size')) {
        document.documentElement.setAttribute('data-font-size', savedFontSize);
      }

      document.body.classList.add('font-size-transition-enabled');

      function updateFontSize(size) {
        document.documentElement.setAttribute('data-font-size', size);
        localStorage.setItem('blog-font-size', size);
        
        Object.keys(fontSizeButtons).forEach(key => {
          if (fontSizeButtons[key]) {
            fontSizeButtons[key].classList.toggle('active', key === size);
          }
        });
      }

      updateFontSize(savedFontSize);

      Object.keys(fontSizeButtons).forEach(size => {
        if (fontSizeButtons[size]) {
          fontSizeButtons[size].addEventListener('click', () => {
            updateFontSize(size);
          });
        }
      });
    </script>
  </body>
</html>
