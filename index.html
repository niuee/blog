<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blog</title>
  <link rel="stylesheet" href="/dark-mode.css" />
  <link rel="stylesheet" href="/blog-styles.css" />
  <script>
    (function () {
      const savedFontSize = localStorage.getItem('blog-font-size') || 'large';
      document.documentElement.setAttribute('data-font-size', savedFontSize);
    })();
  </script>
  <style>
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .intro-content {
      max-width: 600px;
      width: 100%;
      padding: 2rem 1rem;
    }

    .intro-name {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .intro-subtitle {
      color: var(--text-meta-color);
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .intro-description {
      font-size: 1.1rem;
      line-height: 1.7;
      margin: 0 0 2rem 0;
      color: var(--text-color);
      opacity: 0.85;
    }

    .intro-link {
      color: var(--link-color);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .intro-link:hover {
      color: var(--link-hover-color, #2563eb);
    }

    .intro-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--table-border-color, #e5e7eb);
    }

    .intro-nav-link {
      color: var(--text-meta-color);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .intro-nav-link:hover {
      color: var(--link-hover-color, #2563eb);
    }

  </style>
</head>

<body>
  <input type="checkbox" id="dark-mode-toggle" class="dark-mode-toggle" />
  <script src="/blog-dark-mode-boot.js"></script>
  <label for="dark-mode-toggle" class="dark-mode-label" aria-label="Toggle dark mode">
    <span class="switch-plate"><span class="switch-toggle"></span></span>
  </label>
  <div class="container">
    <div class="intro-content">
      <h1 class="intro-name">vee</h1>
      <p class="intro-subtitle">Software Developer and a little bit of everything I'm interested in.</p>
      <div class="intro-description">
        Currently working on <a href="https://banana.vntchang.dev" class="intro-link" target="_blank" rel="noopener">banana</a>.
      </div>
      <nav class="intro-nav">
        <a href="/articles" class="intro-nav-link">Articles</a>
        <a href="/series" class="intro-nav-link">Series</a>
        <a href="https://github.com/niuee" class="intro-nav-link" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </div>
  <script src="/blog-dark-mode.js"></script>
</body>

</html>
