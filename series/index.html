<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script defer src="https://cloud.umami.is/script.js" data-website-id="a6da2d78-28e4-4020-8b74-92c3de6a3a3d"></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Series</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400&family=Noto+Sans+KR:wght@400&family=Noto+Sans+SC:wght@400&family=Noto+Sans+TC:wght@400&family=Noto+Serif+SC:wght@400;600&family=Noto+Serif+TC:wght@400;600&family=Noto+Serif:wght@400;600&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          if (localStorage.getItem('blog-dark-mode') === 'true') {
            document.documentElement.setAttribute('data-blog-dark', '');
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/dark-mode.css" />
    <link rel="stylesheet" href="/blog-styles.css" />
    <script>
      (function() {
        const savedFontSize = localStorage.getItem('blog-font-size') || 'large';
        document.documentElement.setAttribute('data-font-size', savedFontSize);
      })();
      // Set language from URL: /series, /series/{lang}, /series/{slug}, /series/{slug}/{lang}
      (function() {
        const path = window.location.pathname.replace(/\/$/, '');
        const parts = path.replace(/^\/series\/?/, '').split('/').filter(Boolean);
        const knownLangCodes = ['en', 'zh', 'zh-tw', 'zh-cn', 'ja', 'ko', 'es', 'fr', 'de', 'it', 'pt', 'ru', 'ar', 'hi'];
        let lang = null;
        if (parts.length === 1 && knownLangCodes.includes(parts[0].toLowerCase())) {
          lang = parts[0].toLowerCase();
        } else if (parts.length === 2 && knownLangCodes.includes(parts[1].toLowerCase())) {
          lang = parts[1].toLowerCase();
        }
        if (lang) {
          document.documentElement.lang = lang;
        } else {
          document.documentElement.lang = localStorage.getItem('blog-language') || 'en';
        }
      })();
    </script>
    <style>
      .series-header { margin-bottom: 2rem; }
      .series-header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
      .series-header .subtitle { color: var(--text-meta-color); font-size: 1.1rem; }
      .article-list { list-style: none; padding: 0; margin: 0; }
      .article-item { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--table-border-color, #e5e7eb); }
      .article-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
      .article-link { text-decoration: none; color: inherit; display: block; }
      .article-link:hover .article-title { color: var(--link-hover-color, #2563eb); }
      .article-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
      .article-meta { color: var(--text-meta-color); font-size: 0.9rem; margin-bottom: 0.75rem; }
      .article-excerpt { color: var(--text-color); line-height: 1.6; opacity: 0.85; }
      .back-link { display: inline-block; margin-bottom: 2rem; color: var(--text-meta-color); text-decoration: none; font-size: 0.9rem; }
      .back-link:hover { color: var(--link-hover-color, #2563eb); }
      .back-link::before { content: "← "; }
      .no-articles { color: var(--text-meta-color); font-style: italic; }
      .series-list .series-item { margin-bottom: 1.5rem; }
      .series-detail-header { margin-bottom: 1.5rem; color: var(--text-meta-color); }
    </style>
  </head>
  <body data-blog-lang-mode="series">
    <div class="font-size-controls">
      <button class="font-size-btn" id="font-size-medium" aria-label="Medium font size">A</button>
      <button class="font-size-btn" id="font-size-large" aria-label="Large font size">A</button>
      <button class="font-size-btn" id="font-size-xl" aria-label="Extra large font size">A</button>
    </div>
    <input type="checkbox" id="dark-mode-toggle" class="dark-mode-toggle" />
    <script src="/blog-dark-mode-boot.js"></script>
    <label for="dark-mode-toggle" class="dark-mode-label" aria-label="Toggle dark mode">
      <span class="switch-plate"><span class="switch-toggle"></span></span>
    </label>
    <div class="language-selector" id="language-selector">
      <button class="language-selector-btn" id="language-selector-btn" aria-label="Select language" aria-haspopup="true" aria-expanded="false">
        <span class="language-selector-icon">Aa</span>
        <span class="language-selector-text" id="language-selector-text">English</span>
      </button>
      <div class="language-dropdown" id="language-dropdown" role="menu"></div>
    </div>
    <div class="container">
      <nav class="site-nav" aria-label="Site navigation">
        <a href="/" class="site-nav-link" id="nav-link-home">Home</a>
        <a href="/articles" class="site-nav-link" id="nav-link-articles">Articles</a>
        <a href="/series" class="site-nav-link active" id="nav-link-series">Series</a>
      </nav>
      <header class="series-header">
        <h1 id="series-page-title">Series</h1>
        <p class="subtitle" id="series-page-subtitle">Article series</p>
      </header>
      <div id="series-content">
        <!-- Injected: series list or series detail -->
      </div>
    </div>
    <script src="/blog-dark-mode.js"></script>
    <script src="/blog-language-selector.js"></script>
    <script>
      (function() {
        // Font size: restore and persist
        const fontSizeButtons = {
          medium: document.getElementById('font-size-medium'),
          large: document.getElementById('font-size-large'),
          xl: document.getElementById('font-size-xl')
        };
        const savedFontSize = localStorage.getItem('blog-font-size') || 'large';
        if (!document.documentElement.hasAttribute('data-font-size')) {
          document.documentElement.setAttribute('data-font-size', savedFontSize);
        }
        document.body.classList.add('font-size-transition-enabled');
        function updateFontSize(size) {
          document.documentElement.setAttribute('data-font-size', size);
          localStorage.setItem('blog-font-size', size);
          Object.keys(fontSizeButtons).forEach(function(key) {
            if (fontSizeButtons[key]) {
              fontSizeButtons[key].classList.toggle('active', key === size);
            }
          });
        }
        updateFontSize(savedFontSize);
        Object.keys(fontSizeButtons).forEach(function(size) {
          if (fontSizeButtons[size]) {
            fontSizeButtons[size].addEventListener('click', function() {
              updateFontSize(size);
            });
          }
        });
      })();
    </script>
  </body>
</html>
