<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Post</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.0/styles/github.min.css" id="hljs-light-theme" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.0/styles/github-dark.min.css" id="hljs-dark-theme" disabled />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/katex.min.css" />
    <link rel="stylesheet" href="/dark-mode.css" />
    <link rel="stylesheet" href="/blog-styles.css" />
    <script>
      // Set font size attribute immediately before body renders to prevent animation
      (function() {
        const savedFontSize = localStorage.getItem('blog-font-size') || 'large';
        document.documentElement.setAttribute('data-font-size', savedFontSize);
      })();
      
      // Set language attribute based on current URL
      // The JavaScript will update this if needed based on system preference
      (function() {
        const urlMatch = window.location.pathname.match(/^\/articles\/([^\/]+)(?:\/([a-z]{2}(?:-[a-z]{2})?))?(?:\/|\.html)?$/i);
        if (urlMatch && urlMatch[2]) {
          document.documentElement.lang = urlMatch[2].toLowerCase();
        } else {
          // Default to English for base content, JavaScript will update if needed
          const savedLang = localStorage.getItem('blog-language');
          document.documentElement.lang = savedLang || 'en';
        }
      })();
    </script>
  </head>
  <body>
    <div class="font-size-controls">
      <button class="font-size-btn" id="font-size-small" aria-label="Small font size" title="Small">A</button>
      <button class="font-size-btn" id="font-size-medium" aria-label="Medium font size" title="Medium">A</button>
      <button class="font-size-btn" id="font-size-large" aria-label="Large font size" title="Large">A</button>
    </div>
    <input type="checkbox" id="dark-mode-toggle" class="dark-mode-toggle" />
    <script>
      // Set dark mode state immediately to prevent flash
      (function() {
        const savedDarkMode = localStorage.getItem('blog-dark-mode') === 'true';
        if (savedDarkMode) {
          const darkModeToggle = document.getElementById('dark-mode-toggle');
          if (darkModeToggle) {
            darkModeToggle.checked = true;
          }
          // Also toggle highlight.js theme immediately
          const hljsLightTheme = document.getElementById('hljs-light-theme');
          const hljsDarkTheme = document.getElementById('hljs-dark-theme');
          if (hljsLightTheme && hljsDarkTheme) {
            hljsLightTheme.disabled = true;
            hljsDarkTheme.disabled = false;
          }
        }
      })();
    </script>
    <label for="dark-mode-toggle" class="dark-mode-label" aria-label="Toggle dark mode">
      <span class="switch-plate">
        <span class="switch-toggle"></span>
      </span>
    </label>
    <div class="language-selector" id="language-selector">
      <button class="language-selector-btn" id="language-selector-btn" aria-label="Select language" aria-haspopup="true" aria-expanded="false">
        <span class="language-selector-icon">Aa</span>
        <span class="language-selector-text" id="language-selector-text">English</span>
      </button>
      <div class="language-dropdown" id="language-dropdown" role="menu">
        <!-- Language options will be populated by JavaScript -->
      </div>
    </div>
    <div class="container">
      <header>
      </header>
      <div id="blog-content"></div>
      <p>first post</p>
    </div>
    <script>
      // Reset scroll position on page load
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;

      // Prevent scroll when toggling dark mode
      const darkModeToggle = document.getElementById('dark-mode-toggle');
      const darkModeLabel = document.querySelector('.dark-mode-label');
      const hljsLightTheme = document.getElementById('hljs-light-theme');
      const hljsDarkTheme = document.getElementById('hljs-dark-theme');
      
      // Load saved dark mode preference on page load
      const savedDarkMode = localStorage.getItem('blog-dark-mode') === 'true';
      if (savedDarkMode && darkModeToggle) {
        darkModeToggle.checked = true;
        if (hljsLightTheme && hljsDarkTheme) {
          hljsLightTheme.disabled = true;
          hljsDarkTheme.disabled = false;
        }
      }

      if (darkModeToggle && darkModeLabel) {
        // Store scroll position before toggle
        let scrollPosition = 0;
        
        darkModeLabel.addEventListener('mousedown', () => {
          scrollPosition = window.pageYOffset || document.documentElement.scrollTop;
        });
        
        darkModeLabel.addEventListener('click', (e) => {
          // Prevent default behavior that might cause scrolling
          e.preventDefault();
          
          // Toggle the checkbox manually
          darkModeToggle.checked = !darkModeToggle.checked;
          
          // Save preference to localStorage
          localStorage.setItem('blog-dark-mode', darkModeToggle.checked ? 'true' : 'false');
          
          // Toggle highlight.js theme
          if (hljsLightTheme && hljsDarkTheme) {
            hljsLightTheme.disabled = darkModeToggle.checked;
            hljsDarkTheme.disabled = !darkModeToggle.checked;
          }
          
          // Restore scroll position after a brief delay
          setTimeout(() => {
            window.scrollTo(0, scrollPosition);
            if (document.documentElement.scrollTop !== scrollPosition) {
              document.documentElement.scrollTop = scrollPosition;
            }
            if (document.body.scrollTop !== scrollPosition) {
              document.body.scrollTop = scrollPosition;
            }
          }, 0);
        });
        
        // Also prevent focus on the checkbox
        darkModeToggle.addEventListener('focus', (e) => {
          e.preventDefault();
          darkModeToggle.blur();
        });
        
        // Also handle the change event for highlight.js (in case checkbox is toggled another way)
        darkModeToggle.addEventListener('change', function(e) {
          // Save preference to localStorage
          localStorage.setItem('blog-dark-mode', e.target.checked ? 'true' : 'false');
          
          if (hljsLightTheme && hljsDarkTheme) {
            hljsLightTheme.disabled = e.target.checked;
            hljsDarkTheme.disabled = !e.target.checked;
          }
        });
      }

      // Font size controls
      const fontSizeButtons = {
        small: document.getElementById('font-size-small'),
        medium: document.getElementById('font-size-medium'),
        large: document.getElementById('font-size-large')
      };

      // Load saved font size preference (already set in head, but ensure consistency)
      const savedFontSize = localStorage.getItem('blog-font-size') || 'large';
      // Don't set attribute again if it's already set to prevent animation
      if (!document.documentElement.hasAttribute('data-font-size')) {
        document.documentElement.setAttribute('data-font-size', savedFontSize);
      }

      // Enable font-size transition after initial load
      document.body.classList.add('font-size-transition-enabled');

      // Function to update font size
      function updateFontSize(size) {
        document.documentElement.setAttribute('data-font-size', size);
        localStorage.setItem('blog-font-size', size);
        
        // Update button states
        Object.keys(fontSizeButtons).forEach(key => {
          if (fontSizeButtons[key]) {
            fontSizeButtons[key].classList.toggle('active', key === size);
          }
        });
      }

      // Set initial active button based on saved preference
      updateFontSize(savedFontSize);

      // Add click handlers
      Object.keys(fontSizeButtons).forEach(size => {
        if (fontSizeButtons[size]) {
          fontSizeButtons[size].addEventListener('click', () => {
            updateFontSize(size);
          });
        }
      });

      // Language selector functionality
      (function() {
        const languageSelector = document.getElementById('language-selector');
        const languageSelectorBtn = document.getElementById('language-selector-btn');
        const languageDropdown = document.getElementById('language-dropdown');
        const languageSelectorText = document.getElementById('language-selector-text');

        if (!languageSelector || !languageSelectorBtn || !languageDropdown) {
          return;
        }

        // Language names mapping
        const languageNames = {
          'en': 'English',
          'zh-tw': '繁體中文',
          'zh-cn': '简体中文',
          'zh': '中文',
          'ja': '日本語',
          'ko': '한국어',
          'es': 'Español',
          'fr': 'Français',
          'de': 'Deutsch',
          'it': 'Italiano',
          'pt': 'Português',
          'ru': 'Русский',
          'ar': 'العربية',
          'hi': 'हिन्दी'
        };

        // Get current URL info
        function getCurrentUrlInfo() {
          const path = window.location.pathname;
          const match = path.match(/^\/articles\/([^\/]+)(?:\/([a-z]{2}(?:-[a-z]{2})?))?(?:\/|\.html)?$/i);
          if (match) {
            return {
              postName: match[1],
              currentLang: match[2] ? match[2].toLowerCase() : null
            };
          }
          return { postName: null, currentLang: null };
        }

        // Detect available languages by trying to fetch them
        async function detectAvailableLanguages(postName) {
          if (!postName) return [];

          // Only check for English (default) and Traditional Chinese
          const languagesToCheck = ['en', 'zh-tw'];
          const availableLanguages = [];

          // Check if default (null) exists - this is the base URL without language
          try {
            const defaultResponse = await fetch(`/articles/${postName}`, { method: 'HEAD', cache: 'no-cache' });
            if (defaultResponse.ok) {
              availableLanguages.push(null); // null means default (usually English)
            }
          } catch (e) {
            // If default doesn't exist, we still need to check explicit languages
          }

          // Try to fetch each language variant to see if it exists
          // Use Promise.allSettled to check all languages in parallel
          const checks = await Promise.allSettled(
            languagesToCheck.map(async (lang) => {
              try {
                const url = `/articles/${postName}/${lang}`;
                const response = await fetch(url, { method: 'HEAD', cache: 'no-cache' });
                return { lang, exists: response.ok };
              } catch (e) {
                return { lang, exists: false };
              }
            })
          );

          checks.forEach((result) => {
            if (result.status === 'fulfilled' && result.value.exists) {
              // If 'en' exists as explicit file, don't add null (default) to avoid duplicate
              // If null already exists and 'en' is found, remove null and add 'en' instead
              if (result.value.lang === 'en') {
                // Remove null if it exists (to avoid duplicate English)
                const nullIndex = availableLanguages.indexOf(null);
                if (nullIndex !== -1) {
                  availableLanguages.splice(nullIndex, 1);
                }
                availableLanguages.push('en');
              } else {
                availableLanguages.push(result.value.lang);
              }
            }
          });

          // If no language variants found, assume at least default exists
          if (availableLanguages.length === 0) {
            return [null];
          }

          return availableLanguages;
        }

        // Initialize language selector
        async function initLanguageSelector() {
          const { postName, currentLang } = getCurrentUrlInfo();
          
          if (!postName) {
            // Not a blog article page, hide language selector
            if (languageSelector) {
              languageSelector.style.display = 'none';
            }
            return;
          }

          // Detect available languages
          const availableLanguages = await detectAvailableLanguages(postName);
          
          if (availableLanguages.length <= 1) {
            // Only one language available, hide selector
            if (languageSelector) {
              languageSelector.style.display = 'none';
            }
            return;
          }

          // Update current language display - use full language name
          const currentLangCode = currentLang || 'en';
          const displayText = languageNames[currentLangCode] || currentLangCode.toUpperCase().split('-')[0];
          if (languageSelectorText) {
            languageSelectorText.textContent = displayText;
          }

          // Populate dropdown
          languageDropdown.innerHTML = '';
          availableLanguages.forEach(lang => {
            const langCode = lang || 'en';
            const langName = languageNames[langCode] || langCode.toUpperCase();
            const langOption = document.createElement('button');
            langOption.className = 'language-option';
            langOption.textContent = langName;
            langOption.setAttribute('data-lang', lang || '');
            langOption.setAttribute('role', 'menuitem');
            
            if ((lang === null && currentLang === null) || (lang === currentLang)) {
              langOption.classList.add('active');
            }

            langOption.addEventListener('click', () => {
              switchLanguage(lang);
            });

            languageDropdown.appendChild(langOption);
          });

          // Check saved preference first, then system language if no language is selected
          if (currentLang === null) {
            const savedLang = localStorage.getItem('blog-language');
            
            // If user has a saved preference, use it
            if (savedLang && availableLanguages.includes(savedLang)) {
              switchLanguage(savedLang, false); // Don't save again, it's already saved
              return;
            }

            // Otherwise, try to match system language with available languages
            const systemLang = navigator.language || navigator.userLanguage || 'en';
            const systemLangCode = systemLang.toLowerCase().split('-')[0];
            const systemLangFull = systemLang.toLowerCase();
            
            // Try to match system language with available languages
            let preferredLang = null;
            if (availableLanguages.includes(systemLangFull)) {
              preferredLang = systemLangFull;
            } else if (availableLanguages.includes(systemLangCode)) {
              preferredLang = systemLangCode;
            } else if (systemLangFull.startsWith('zh') && availableLanguages.includes('zh-tw')) {
              preferredLang = 'zh-tw';
            } else if (systemLangFull.startsWith('zh') && availableLanguages.includes('zh-cn')) {
              preferredLang = 'zh-cn';
            }

            // If system language matches an available language, auto-switch
            if (preferredLang) {
              switchLanguage(preferredLang, false); // Don't save to localStorage on auto-detect
            }
          } else {
            // Update saved preference if current language is different
            const savedLang = localStorage.getItem('blog-language');
            if (savedLang !== currentLang) {
              localStorage.setItem('blog-language', currentLang);
            }
          }
        }

        // Switch language
        function switchLanguage(lang, savePreference = true) {
          const { postName } = getCurrentUrlInfo();
          if (!postName) return;

          // Update HTML lang attribute
          const langCode = lang || 'en';
          document.documentElement.lang = langCode;

          // Save preference
          if (savePreference) {
            localStorage.setItem('blog-language', langCode);
          }

          // Navigate to new URL
          const newUrl = lang ? `/articles/${postName}/${lang}` : `/articles/${postName}`;
          window.location.href = newUrl;
        }

        // Toggle dropdown
        languageSelectorBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const isExpanded = languageSelectorBtn.getAttribute('aria-expanded') === 'true';
          languageSelectorBtn.setAttribute('aria-expanded', !isExpanded);
          languageDropdown.classList.toggle('show');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
          if (!languageSelector.contains(e.target)) {
            languageSelectorBtn.setAttribute('aria-expanded', 'false');
            languageDropdown.classList.remove('show');
          }
        });

        // Close dropdown on escape key
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && languageDropdown.classList.contains('show')) {
            languageSelectorBtn.setAttribute('aria-expanded', 'false');
            languageDropdown.classList.remove('show');
          }
        });

        // Initialize on page load
        initLanguageSelector();
      })();
    </script>
  </body>
</html>
